name: Playwright E2E Tests

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install chromium --with-deps

      - name: Ejecutar tests E2E
        run: npx playwright test
        env:
          BASE_URL:       ${{ secrets.TEST_BASE_URL }}
          TEST_EMAIL:     ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD:  ${{ secrets.TEST_PASSWORD }}
          # Variables de Firebase para el proyecto de test
          NEXT_PUBLIC_FIREBASE_API_KEY:             ${{ secrets.TEST_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:         ${{ secrets.TEST_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:          ${{ secrets.TEST_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:      ${{ secrets.TEST_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.TEST_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID:              ${{ secrets.TEST_FIREBASE_APP_ID }}

      - name: Subir reporte de tests
        uses: actions/upload-artifact@v4
        if: always()   # siempre sube el reporte, incluso si fallan tests
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
